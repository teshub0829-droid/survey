<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>직원 취향 & 알러지 설문조사</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 48px 44px 40px;
      max-width: 620px;
      width: 100%;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-text { font-size: 13px; color: #888; font-weight: 500; }

    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #667eea;
      text-transform: uppercase;
      margin-bottom: 16px;
      margin-top: 32px;
    }
    .section-title:first-of-type { margin-top: 0; }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 7px;
    }
    label span.req { color: #ef4444; margin-left: 2px; }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a2e;
      background: #f8fafc;
      transition: border 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.13);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 80px; }

    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-group input[type="checkbox"] { display: none; }
    .tag-group label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 15px;
      border: 1.5px solid #e2e8f0;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      background: #f8fafc;
      transition: all 0.15s;
      margin-bottom: 0;
    }
    .tag-group input[type="checkbox"]:checked + label {
      border-color: #667eea;
      background: #eef0fd;
      color: #4f46e5;
    }

    .allergy-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .allergy-grid input[type="checkbox"] { display: none; }
    .allergy-grid label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 10px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      background: #f8fafc;
      transition: all 0.15s;
      margin-bottom: 0;
      text-align: center;
    }
    .allergy-grid input[type="checkbox"]:checked + label {
      border-color: #f87171;
      background: #fef2f2;
      color: #dc2626;
    }

    .divider {
      height: 1px;
      background: #f0f4f8;
      margin: 28px 0;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.98); }

    /* Success screen */
    #success {
      display: none;
      text-align: center;
      padding: 40px 0;
    }
    .success-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }
    #success h2 {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    #success p {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }
    .result-table {
      text-align: left;
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 13px;
      color: #444;
      line-height: 1.8;
    }
    .result-table b { color: #4f46e5; }
    .again-btn {
      margin-top: 20px;
      padding: 11px 28px;
      background: #f0f4f8;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
      cursor: pointer;
      transition: background 0.15s;
    }
    .again-btn:hover { background: #e2e8f0; }

    /* CSV download */
    .download-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .dl-btn {
      font-size: 12px;
      color: #667eea;
      background: none;
      border: 1.5px solid #c7d2fe;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    .dl-btn:hover { background: #eef0fd; }
  </style>
</head>
<body>
<div class="card">
  <!-- Form -->
  <div id="form-view">
    <div class="logo">
      <div class="logo-icon">🍱</div>
      <span class="logo-text">팀 점심 매칭 시스템</span>
    </div>
    <h1>취향 &amp; 알러지 설문</h1>
    <p class="subtitle">응답 내용은 점심 메뉴 추천 및 자리 배치에 활용됩니다.</p>

    <!-- 기본 정보 -->
    <div class="section-title">👤 기본 정보</div>

    <div class="field">
      <label>이름 <span class="req">*</span></label>
      <input type="text" id="name" placeholder="예: 홍길동" />
    </div>

    <!-- 선호 음식 -->
    <div class="section-title">😋 선호하는 음식</div>
    <div class="field">
      <div class="tag-group">
        <input type="checkbox" id="p_korean" value="한식"><label for="p_korean">🍚 한식</label>
        <input type="checkbox" id="p_japanese" value="일식"><label for="p_japanese">🍱 일식</label>
        <input type="checkbox" id="p_chinese" value="중식"><label for="p_chinese">🥢 중식</label>
        <input type="checkbox" id="p_western" value="양식"><label for="p_western">🍝 양식</label>
        <input type="checkbox" id="p_salad" value="샐러드"><label for="p_salad">🥗 샐러드</label>
        <input type="checkbox" id="p_snack" value="분식"><label for="p_snack">🍜 분식</label>
        <input type="checkbox" id="p_meat" value="고기"><label for="p_meat">🥩 고기</label>
        <input type="checkbox" id="p_soup" value="국물"><label for="p_soup">🍲 국물</label>
        <input type="checkbox" id="p_donburi" value="덮밥"><label for="p_donburi">🍛 덮밥</label>
        <input type="checkbox" id="p_burger" value="버거"><label for="p_burger">🍔 버거</label>
        <input type="checkbox" id="p_sandwich" value="샌드위치"><label for="p_sandwich">🥪 샌드위치</label>
        <input type="checkbox" id="p_bibimbap" value="비빔밥"><label for="p_bibimbap">🥣 비빔밥</label>
      </div>
    </div>

    <!-- 비선호 음식 -->
    <div class="section-title">🚫 비선호하는 음식</div>
    <div class="field">
      <div class="tag-group">
        <input type="checkbox" id="d_spicy" value="매운음식"><label for="d_spicy">🌶 매운음식</label>
        <input type="checkbox" id="d_greasy" value="기름진 음식"><label for="d_greasy">🛢 기름진 음식</label>
        <input type="checkbox" id="d_seafood" value="해산물"><label for="d_seafood">🦞 해산물</label>
        <input type="checkbox" id="d_noodle" value="면류"><label for="d_noodle">🍜 면류</label>
        <input type="checkbox" id="d_soup2" value="국물"><label for="d_soup2">🍵 국물</label>
        <input type="checkbox" id="d_cheese" value="치즈"><label for="d_cheese">🧀 치즈</label>
        <input type="checkbox" id="d_salad2" value="샐러드만"><label for="d_salad2">🥗 샐러드만</label>
        <input type="checkbox" id="d_fish" value="생선"><label for="d_fish">🐟 생선</label>
        <input type="checkbox" id="d_coriander" value="고수"><label for="d_coriander">🌿 고수</label>
        <input type="checkbox" id="d_noisy" value="시끄러운 곳"><label for="d_noisy">🔊 시끄러운 곳</label>
        <input type="checkbox" id="d_wait" value="대기 긴 곳"><label for="d_wait">⏳ 대기 긴 곳</label>
      </div>
    </div>

    <!-- 알러지/제약 -->
    <div class="section-title">⚠️ 알러지 &amp; 식이 제약</div>
    <div class="field">
      <div class="allergy-grid">
        <input type="checkbox" id="a_shrimp" value="새우 알러지"><label for="a_shrimp">🦐 새우</label>
        <input type="checkbox" id="a_milk" value="유당 민감"><label for="a_milk">🥛 유당</label>
        <input type="checkbox" id="a_nut" value="견과류 알러지"><label for="a_nut">🥜 견과류</label>
        <input type="checkbox" id="a_egg" value="달걀 알러지"><label for="a_egg">🥚 달걀</label>
        <input type="checkbox" id="a_wheat" value="밀가루 민감"><label for="a_wheat">🌾 밀가루</label>
        <input type="checkbox" id="a_vegan" value="채식 지향"><label for="a_vegan">🥦 채식</label>
        <input type="checkbox" id="a_gluten" value="글루텐 프리"><label for="a_gluten">🌻 글루텐프리</label>
        <input type="checkbox" id="a_none" value="없음"><label for="a_none">✅ 없음</label>
        <input type="checkbox" id="a_other" value="기타"><label for="a_other">📝 기타</label>
      </div>
    </div>

    <!-- 기타 비고 -->
    <div class="section-title">💬 추가 사항</div>
    <div class="field">
      <label>비고 <span style="color:#aaa;font-weight:400">(선택)</span></label>
      <textarea id="note" placeholder="예: 12시 50분 전 복귀 필요, 예산 중요, 주차 선호 등"></textarea>
    </div>

    <div class="divider"></div>
    <button class="submit-btn" onclick="submitForm()">✉️ 제출하기</button>
  </div>

  <!-- Success -->
  <div id="success">
    <div class="success-icon">🎉</div>
    <h2>설문 제출 완료!</h2>
    <p>소중한 응답 감사합니다. 아래 내용으로 저장되었습니다.</p>
    <div class="result-table" id="result-summary"></div>
    <div class="download-row">
      <button class="dl-btn" onclick="downloadCSV()">⬇️ CSV 다운로드</button>
    </div>
    <button class="again-btn" onclick="resetForm()">➕ 다른 사람 응답하기</button>
  </div>
</div>

<script>
  // In-memory storage for submissions
  let submissions = [];

  function getChecked(name) {
    return [...document.querySelectorAll(`input[type=checkbox][id^="${name}"]:checked`)]
      .map(el => el.value).join(',');
  }

  function submitForm() {
    const name = document.getElementById('name').value.trim();
    if (!name) {
      alert('이름을 입력해주세요.');
      document.getElementById('name').focus();
      return;
    }

    const prefer = getChecked('p_');
    const dislike = getChecked('d_');
    const allergy = getChecked('a_');
    const note = document.getElementById('note').value.trim();

    const entry = {
      이름: name,
      선호: prefer || '-',
      비선호: dislike || '-',
      제약조건: allergy || '없음',
      비고: note || '-'
    };

    submissions.push(entry);

    // Show result
    document.getElementById('result-summary').innerHTML = `
      <b>이름</b>: ${entry.이름}<br>
      <b>선호</b>: ${entry.선호}<br>
      <b>비선호</b>: ${entry.비선호}<br>
      <b>제약조건</b>: ${entry.제약조건}<br>
      <b>비고</b>: ${entry.비고}
    `;

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }

  function resetForm() {
    document.getElementById('name').value = '';
    document.getElementById('note').value = '';
    document.querySelectorAll('input[type=checkbox]').forEach(el => el.checked = false);
    document.getElementById('success').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function downloadCSV() {
    if (!submissions.length) return;
    const headers = ['이름', '선호', '비선호', '제약조건', '비고'];
    const rows = submissions.map(r => headers.map(h => `"${(r[h]||'').replace(/"/g,'""')}"`).join(','));
    const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '직원_취향_알러지_설문결과.csv';
    a.click(); URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
